packages:
  settings: !include settings.yaml
  helpers: !include packages/shared_helpers.yaml
  esp32c6: !include packages/device_esp32c6.yaml

esphome:
  name: ${device_name}
  friendly_name: ${friendly_name}
  comment: ${device_description}
  includes:
    - ../include/status_led_helper.h
    - ../include/wifi_protocol_helper.h

logger:

api:
  encryption:
    key: !secret encryption_key

ota:
  - platform: esphome
    password: !secret ota_password

wifi:
  ssid: !secret wifi_ssid
  password: !secret wifi_password
  ap:
    ssid: !secret ap_wifi_ssid
    password: !secret ap_wifi_password

captive_portal:

web_server:
  port: 80
  version: 3
  auth:
    username: !secret web_server_username
    password: !secret web_server_password
  sorting_groups:
    - id: sorting_group_sensors
      name: "Sensors"
      sorting_weight: 1
    - id: sorting_group_settings
      name: "Settings"
      sorting_weight: 2
    - id: sorting_group_diagnostic
      name: "Diagnostic"
      sorting_weight: 3
    - id: sorting_group_system
      name: "System Management"
      sorting_weight: 4

sensor:
  - platform: adc
    id: soil_moisture_voltage
    pin: ${sensor_gpio}
    name: "${friendly_name} Voltage"
    device_class: voltage
    state_class: measurement
    unit_of_measurement: "V"
    accuracy_decimals: 3
    icon: mdi:flash
    attenuation: 12db
    update_interval: ${update_interval}
    samples: 8
    entity_category: diagnostic
    web_server:
      sorting_group_id: sorting_group_sensors

  - platform: copy
    source_id: soil_moisture_voltage
    name: "${friendly_name} Percentage"
    device_class: moisture
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:sprout
    filters:
      - lambda: |-
          const float dry = ${dry_voltage};
          const float wet = ${wet_voltage};
          if (x >= dry) {
            return 0.0f;
          }
          if (x <= wet) {
            return 100.0f;
          }
          return (dry - x) * 100.0f / (dry - wet);
      - clamp:
          min_value: 0
          max_value: 100
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
    web_server:
      sorting_group_id: sorting_group_sensors
