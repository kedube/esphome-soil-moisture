esp8266:
  board: d1_mini_pro
  framework:
    version: recommended

light:
  - platform: status_led
    id: status_led_light
    name: "Status LED"
    pin:
      number: ${status_led_pin}
      inverted: true
    restore_mode: ALWAYS_OFF

sensor:
  - platform: adc
    id: soil_moisture_voltage
    pin: ${sensor_gpio}
    name: "Soil Moisture Voltage"
    device_class: voltage
    state_class: measurement
    unit_of_measurement: "V"
    accuracy_decimals: 3
    icon: mdi:flash
    update_interval: ${update_interval}
    samples: 8
    filters:
      - multiply: 3.3

  - platform: copy
    source_id: soil_moisture_voltage
    name: "Soil Moisture Percentage"
    device_class: moisture
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:sprout
    filters:
      - lambda: |-
          const float dry = ${dry_voltage};
          const float wet = ${wet_voltage};
          if (x >= dry) {
            return 0.0f;
          }
          if (x <= wet) {
            return 100.0f;
          }
          return (dry - x) * 100.0f / (dry - wet);
      - clamp:
          min_value: 0
          max_value: 100
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1
