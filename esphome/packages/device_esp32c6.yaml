globals:
  - id: status_booting
    type: bool
    restore_value: no
    initial_value: "true"
  - id: status_wifi_connected
    type: bool
    restore_value: no
    initial_value: "false"
  - id: status_api_client_count
    type: int
    restore_value: no
    initial_value: "0"
  - id: status_configured_appliances
    type: int
    restore_value: no
    initial_value: "0"
  - id: status_connected_appliances
    type: int
    restore_value: no
    initial_value: "0"
  - id: status_led_state
    type: int
    restore_value: no
    initial_value: "-1"

api:
  on_client_connected:
    then:
      - lambda: |-
          id(status_api_client_count) += 1;
      - script.execute: update_status_led
  on_client_disconnected:
    then:
      - lambda: |-
          if (id(status_api_client_count) > 0) id(status_api_client_count) -= 1;
      - script.execute: update_status_led

esphome:
  includes:
    - ../include/status_led_helper.h
    - ../include/wifi_protocol_helper.h
  on_boot:
    - priority: -10
      then:
        - delay: 1s
        - script.execute: update_status_led
    - priority: -100
      then:
        - delay: 10s
        - lambda: |-
            id(status_booting) = false;
        - script.execute: update_status_led

esp32:
  board: esp32-c6-devkitc-1
  variant: esp32c6
  flash_size: 8MB
  cpu_frequency: 160MHz
  framework:
    type: esp-idf
    version: latest
    advanced:
      enable_ota_rollback: true

light:
  - platform: esp32_rmt_led_strip
    id: status_led
    name: "Status LED"
    chipset: ws2812
    rgb_order: RGB
    pin: 
      number: ${status_led_pin}
      ignore_strapping_warning: true
    num_leds: 1
    restore_mode: ALWAYS_OFF
    effects:
      - pulse:
          name: "Pulse Red"
          transition_length: 0.5s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 60%
      - pulse:
          name: "Pulse Blue"
          transition_length: 1s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 60%
      - pulse:
          name: "Pulse Yellow"
          transition_length: 0.5s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 60%
      - pulse:
          name: "Pulse White"
          transition_length: 0.5s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 60%
      - pulse:
          name: "Pulse Purple"
          transition_length: 0.5s
          update_interval: 2s
          min_brightness: 10%
          max_brightness: 60%
    internal: true

wifi:
  on_connect:
    - lambda: |-
        id(status_wifi_connected) = true;
    - script.execute: update_status_led
  on_disconnect:
    - lambda: |-
        id(status_wifi_connected) = false;
    - script.execute: update_status_led

sensor:
  - platform: adc
    id: soil_moisture_voltage
    pin: ${sensor_gpio}
    name: "Soil Moisture Voltage"
    device_class: voltage
    state_class: measurement
    unit_of_measurement: "V"
    accuracy_decimals: 3
    icon: mdi:flash
    attenuation: 12db
    update_interval: ${update_interval}
    samples: 8

  - platform: copy
    source_id: soil_moisture_voltage
    name: "Soil Moisture Percentage"
    device_class: moisture
    unit_of_measurement: "%"
    state_class: measurement
    accuracy_decimals: 0
    icon: mdi:sprout
    filters:
      - lambda: |-
          const float dry = ${dry_voltage};
          const float wet = ${wet_voltage};
          if (x >= dry) {
            return 0.0f;
          }
          if (x <= wet) {
            return 100.0f;
          }
          return (dry - x) * 100.0f / (dry - wet);
      - clamp:
          min_value: 0
          max_value: 100
      - sliding_window_moving_average:
          window_size: 5
          send_every: 1

text_sensor:
  - platform: template
    name: "WIFI Protocol"
    entity_category: diagnostic
    id: wifi_protocol
    icon: "mdi:wifi-cog"
    lambda: |-
      return get_negotiated_wifi_protocol();
    update_interval: 300s

script:
  - id: update_status_led
    mode: restart
    then:
      - lambda: |-
          const int next_state = compute_status_led_state(
            id(status_booting),
            id(status_wifi_connected),
            id(status_api_client_count) > 0,
            id(status_connected_appliances),
            id(status_configured_appliances));
          if (next_state == id(status_led_state)) return;
          id(status_led_state) = next_state;
          apply_status_led(id(status_led), next_state);
